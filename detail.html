<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <style>
    /* ============================================
       Detail Page — consistent with main site
       Dark + Neon accent
       ============================================ */
    :root {
      --bg-deep: #050508;
      --bg-surface: #0a0a12;
      --bg-card: #0e0e1a;
      --neon: #c8ff00;
      --neon-dim: rgba(200,255,0,0.15);
      --neon-glow: rgba(200,255,0,0.4);
      --text-primary: #e8e8ed;
      --text-secondary: #8888a0;
      --text-muted: #555568;
      --border-subtle: rgba(255,255,255,0.06);
      --border-glow: rgba(200,255,0,0.3);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* --- Back button --- */
    .back-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: color 0.3s;
    }

    .back-link:hover { color: var(--neon); }

    .back-arrow {
      font-size: 1.2rem;
      line-height: 1;
      color: var(--neon);
    }

    /* --- Hero --- */
    .detail-hero {
      min-height: 55vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      padding: 6rem 2rem 4rem;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(200,255,0,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-bg-lines {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, var(--border-subtle) 1px, transparent 1px),
        linear-gradient(0deg, var(--border-subtle) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      z-index: 2;
    }

    .hero-tag {
      display: inline-block;
      border: 1px solid var(--neon);
      color: var(--neon);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      padding: 0.4rem 1.2rem;
      margin-bottom: 1.5rem;
    }

    .hero-name {
      font-size: clamp(2.5rem, 7vw, 5.5rem);
      font-weight: 900;
      text-transform: uppercase;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    .hero-name .hl {
      color: var(--neon);
      text-shadow: 0 0 60px var(--neon-glow);
    }

    .hero-role {
      font-size: 1.1rem;
      color: var(--text-secondary);
      margin-top: 1rem;
    }

    /* --- Content --- */
    .detail-content {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2rem 5rem;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
    }

    @media (max-width: 700px) {
      .content-grid { grid-template-columns: 1fr; gap: 2rem; }
    }

    /* --- Bio --- */
    .bio-section h2,
    .stats-section h2 {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--neon);
      margin-bottom: 1rem;
    }

    .bio-section p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.8;
      margin-bottom: 1rem;
    }

    /* --- Stats --- */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .stat-box {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      padding: 1.25rem;
      text-align: center;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--neon);
      line-height: 1;
    }

    .stat-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-top: 0.5rem;
    }

    /* --- Achievements --- */
    .achievements {
      margin-top: 3rem;
      border-top: 1px solid var(--border-subtle);
      padding-top: 2rem;
    }

    .achievements h2 {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--neon);
      margin-bottom: 1.5rem;
    }

    .achieve-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }

    @media (max-width: 700px) {
      .achieve-list { grid-template-columns: 1fr; }
    }

    .achieve-item {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      font-size: 0.88rem;
      color: var(--text-secondary);
    }

    .achieve-marker {
      color: var(--neon);
      font-weight: 700;
      flex-shrink: 0;
    }

    /* --- Not found --- */
    .not-found {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .not-found h2 {
      font-size: 2rem;
      font-weight: 900;
      color: var(--neon);
      margin-bottom: 1rem;
    }
  </style>
</head>

        <div class="not-found">
          <h2>Profile Not Found</h2>
          <p style="color:var(--text-muted);margin-bottom:2rem">未找到该人物档案</p>
          <a href="index.html#hobbies" class="back-link"><span class="back-arrow">&#8592;</span> Back to Hobbies</a>
        </div>
      `;
    } else {
      document.title = data.name + ' | Profile';
      const statsHTML = data.stats.map(s => `
        <div class="stat-box">
          <div class="stat-value">${s.v}</div>
          <div class="stat-label">${s.l}</div>
        </div>
      `).join('');

      const achieveHTML = data.achievements.map(a => `
        <div class="achieve-item">
          <span class="achieve-marker">&#9670;</span>
          <span>${a}</span>
        </div>
      `).join('');

      const bioHTML = data.bio.map(p => `<p>${p}</p>`).join('');

      app.innerHTML = `
        <div class="detail-hero">
          <div class="hero-bg"></div>
          <div class="hero-bg-lines"></div>
          <div class="hero-inner">
            <div class="hero-tag">${data.tag}</div>
            <h1 class="hero-name">${data.name}</h1>
            <p class="hero-role">${data.role}</p>
          </div>
        </div>
        <div class="detail-content">
          <div class="content-grid">
            <div class="bio-section">
              <h2>Biography</h2>
              ${bioHTML}
            </div>
            <div class="stats-section">
              <h2>Key Stats</h2>
              <div class="stats-grid">${statsHTML}</div>
            </div>
          </div>
          <div class="achievements">
            <h2>Achievements &amp; Highlights</h2>
            <div class="achieve-list">${achieveHTML}</div>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
