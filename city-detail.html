<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOB1S | City</title>

  <style>
    :root {
      --carbon: #0a0a0c;
      --carbon-light: #111115;
      --carbon-card: #14141a;
      --neon: #bfff00;
      --neon-dim: rgba(191, 255, 0, 0.12);
      --neon-glow: rgba(191, 255, 0, 0.35);
      --neon-ghost: rgba(191, 255, 0, 0.06);
      --amber: #ff8c00;
      --amber-dim: rgba(255, 140, 0, 0.2);
      --titanium: #a0a0aa;
      --titanium-dim: #5a5a66;
      --white: #e8e8ec;
      --white-dim: #90909a;
      --border-hairline: rgba(255, 255, 255, 0.05);
      --border-subtle: rgba(255, 255, 255, 0.08);
      --border-active: rgba(191, 255, 0, 0.25);
      --font-display: 'Orbitron', system-ui, sans-serif;
      --font-mono: 'Space Mono', 'Consolas', monospace;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; background: var(--carbon); }
    body {
      font-family: var(--font-mono);
      background: var(--carbon);
      color: var(--white);
      line-height: 1.7;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }

    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 2rem; border-bottom: 1px solid var(--border-hairline);
      position: sticky; top: 0;
      background: rgba(10, 10, 12, 0.92); backdrop-filter: blur(12px); z-index: 100;
    }
    .back-link { color: var(--neon); font-size: 0.7rem; letter-spacing: 0.1em; font-weight: 700; transition: opacity 0.2s; }
    .back-link:hover { opacity: 0.7; }
    .top-brand { font-family: var(--font-display); font-size: 0.8rem; font-weight: 800; color: var(--white); letter-spacing: 0.05em; }
    .top-brand .accent { color: var(--neon); }
    .top-tag { font-size: 0.55rem; letter-spacing: 0.15em; color: var(--titanium-dim); }

    .city-hero { text-align: center; padding: 3rem 2rem 2rem; }
    .city-tag { font-size: 0.55rem; letter-spacing: 0.2em; color: var(--neon); border: 1px solid var(--neon-dim); padding: 0.3rem 1rem; display: inline-block; }
    .city-name-cn { font-family: var(--font-display); font-size: 2.5rem; font-weight: 900; color: var(--white); margin: 0.6rem 0 0.2rem; letter-spacing: -0.02em; }
    .city-role { color: var(--titanium); font-size: 0.85rem; margin-top: 0.3rem; }

    .city-content { max-width: 960px; margin: 0 auto; padding: 0 2rem 4rem; }

    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.6rem; margin-bottom: 2.5rem; }
    .stat-block { background: var(--carbon-card); border: 1px solid var(--border-subtle); text-align: center; padding: 1.2rem 0.8rem; }
    .stat-val { font-family: var(--font-display); font-size: 1.4rem; font-weight: 800; color: var(--neon); line-height: 1.1; }
    .stat-lbl { font-size: 0.5rem; font-weight: 700; letter-spacing: 0.15em; color: var(--titanium-dim); margin-top: 0.4rem; text-transform: uppercase; }

    .city-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem; }

    .bio-section h2, .highlights-section h2 {
      font-family: var(--font-mono); font-size: 0.6rem; font-weight: 700;
      letter-spacing: 0.25em; color: var(--neon); margin-bottom: 1.2rem;
      padding-bottom: 0.5rem; border-bottom: 1px solid var(--border-active);
    }
    .bio-section p { font-size: 0.82rem; color: var(--white-dim); line-height: 1.85; margin-bottom: 1rem; }

    .highlight-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .highlight-item {
      display: flex; align-items: flex-start; gap: 0.5rem;
      font-size: 0.78rem; color: var(--white-dim); padding: 0.5rem 0;
      border-bottom: 1px solid var(--border-hairline);
    }
    .highlight-marker { color: var(--neon); font-weight: 700; flex-shrink: 0; margin-top: 0.15rem; }

    .not-found {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; padding: 2rem;
    }
    .not-found h2 { font-family: var(--font-display); font-size: 2rem; font-weight: 900; color: var(--amber); margin-bottom: 1rem; }
    .not-found a { color: var(--neon); font-size: 0.7rem; font-weight: 700; letter-spacing: 0.15em; margin-top: 1rem; transition: opacity 0.3s; }
    .not-found a:hover { opacity: 0.7; }

    /* --- Impression (wishlist / unvisited) --- */
    .impression-section { margin-top: 1.5rem; }
    .impression-section h2 {
      font-family: var(--font-mono); font-size: 0.6rem; font-weight: 700;
      letter-spacing: 0.25em; color: var(--amber); margin-bottom: 0.8rem;
      padding-bottom: 0.5rem; border-bottom: 1px solid var(--amber-dim);
    }
    .impression-card {
      background: rgba(255, 140, 0, 0.04);
      border: 1px solid rgba(255, 140, 0, 0.2);
      padding: 1.2rem 1.5rem;
      font-size: 0.82rem;
      color: var(--white-dim);
      line-height: 1.85;
      min-height: 6rem;
      font-style: italic;
    }

    .detail-footer { text-align: center; padding: 2rem; border-top: 1px solid var(--border-hairline); margin-top: 2rem; }
    .footer-brand { font-family: var(--font-display); font-size: 0.7rem; font-weight: 800; color: var(--white); letter-spacing: 0.05em; }
    .footer-brand .accent { color: var(--neon); }
    .footer-icp { font-family: var(--font-mono); font-size: 0.55rem; color: var(--titanium-dim); text-decoration: none; margin: 0 1rem; transition: color 0.2s; }
    .footer-icp:hover { color: var(--neon); }
    .footer-year { font-size: 0.55rem; color: var(--titanium-dim); margin-left: 0.5rem; }

    @media (max-width: 768px) {
      .city-content { padding: 0 1rem 3rem; }
      .city-name-cn { font-size: 1.8rem; }
      .stats-row { grid-template-columns: 1fr 1fr; }
      .city-grid { grid-template-columns: 1fr; gap: 2rem; }
      .top-bar { padding: 0.8rem 1rem; }
    }
    @media (max-width: 480px) {
      .city-name-cn { font-size: 1.4rem; }
      .stats-row { grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    }
  </style>
</head>

          '来了青岛怎么能不喝啤酒？拎一袋散装青岛啤酒，坐在海边吹着海风——这就是青岛人的日常，也是游客最羡慕的体验。'
        ],
        stats: [
          { v: '5天', l: '旅行天数' },
          { v: '2025', l: '旅行时间' },
          { v: '大海', l: '最深印象' },
          { v: '★★★★★', l: '推荐指数' }
        ],
        highlights: [

      // ==========================================

          '嘉兴给人的第一印象是安静。没有杭州的拥挤，没有上海的喧闹，这座江南小城有自己的节奏。',

          '嘉兴粽子全国闻名，端午前后满城粽叶飘香。这座城市的魅力在于它的低调——你来过就会发现，江南不只是苏杭，嘉兴自有风景。'
        ],
        stats: [
          { v: '3天', l: '旅行天数' },
          { v: '2026', l: '旅行时间' },
          { v: '南湖', l: '最深印象' },
          { v: '★★★★', l: '推荐指数' }
        ],
        highlights: [

          '杭州是我上大学的地方，也是除了家乡之外待得最久的城市。西湖的美不是惊心动魄的那种，而是每天路过都会多看两眼的温柔。',

          '杭州的四季各有风景：春天的樱花和龙井新茶，夏天的曲院风荷，秋天的满陇桂雨，冬天的断桥残雪。在这座城市里生活，本身就是一种幸运。',

          '灵隐寺的晨钟与禅意',
          '龙井村品一杯正宗明前龙井',

        ]

    // =============================================
    // District Notes — 直辖市的区级足迹（简洁印象）
    // =============================================
    const DISTRICT_NOTES = {
      '110000_haidian':{
       name: '海淀',
       tag: '北京市 · 海淀区',
       impression: [
             '早就听说中国教育看北京，北京教育看海淀。果真如此，让人梦寐以求的高校，这里数不胜数。各种研究所也云集于此，学术氛围浓厚。',
             '我们在这里参观了中国科学院植物研究所，听了几场讲座。',
             '还参观了北京大学的某个门（因为疫情没能进去），时值六月，空气里充满了毕业季的气息。当时读不懂空气中的欣喜和不舍，现在想来，我毕业时大抵也是如此。',
             '后来在植物研究所听一个叫夏天的学长带我们云游清华园，我那时候觉得他很有意思，但我不喜欢他，因为当时的我是个以貌取人的小孩。'
        ]
    },
      '110000_dongcheng': {
        name: '东城',
        tag: '北京市 · 东城区',
        impression: [
          '在这里写下你在东城的经历...'
        ]
      },
      '110000_xicheng': {
        name: '西城',
        tag: '北京市 · 西城区',
        impression: [
          '在这里写下你在西城的经历...'
        ]
      },
      '110000_shijingshan': {
        name: '石景山',
        tag: '北京市 · 石景山区',
        impression: [
          '在这里写下你在石景山的经历...'
        ]
      },
      '110000_yanqing': {
        name: '延庆',
        tag: '北京市 · 延庆区',
        impression: [
          '在这里写下你在延庆的经历...'
        ]
      },
      '310000_minhang': {
        name: '闵行',
        tag: '上海市 · 闵行区',
        impression: [
          '在这里写下你在闵行的经历...'
        ]
      },
      '310000_huangpu': {
        name: '黄浦',
        tag: '上海市 · 黄浦区',
        impression: [
          '在这里写下你在黄浦的经历...'
        ]
      },
      '310000_songjiang': {
        name: '松江',
        tag: '上海市 · 松江区',
        impression: [
          '在这里写下你在松江的经历...'
        ]
      },
    };

    // =============================================
    // Wishlist Impressions — 还没去过的地方，先留个印象
    // =============================================
    const WISHLIST_IMPRESSIONS = {
      '510000_成都': {
        name: '成都',
        tag: '四川省',
        role: '天府之国 · 尚未踏足',
        impression: '我一定会来的，我对这里早已充满憧憬。我听说四川人直率而松弛，我也有四川的朋友，所以我对这里很感兴趣。'
      },
      '500000_重庆': {
        name: '重庆',
        tag: '重庆市',
        role: '山城雾都 · 尚未踏足',
        impression: '想吃正宗重庆火锅'
      },
      '440000_广州': {
        name: '广州',
        tag: '广东省',
        role: '千年商都 · 尚未踏足',
        impression: '尝尝凉茶'
      },
      '440000_深圳': {
        name: '深圳',
        tag: '广东省',
        role: '创新之城 · 尚未踏足',
        impression: '听说这里有只企鹅很狂'
      },
      '420000_武汉': {
        name: '武汉',
        tag: '湖北省',
        role: '九省通衢 · 尚未踏足',
        impression: '来这里过个早呢'
      },
      '430000_长沙': {

        tag: '湖南省',

        impression: '看万山红遍，层林尽染；漫江碧透，百舸争流。'
      },
      '350000_厦门': {
        name: '厦门',
        tag: '福建省',
        role: '海上花园 · 尚未踏足',

      },
      '530000_大理': {
        name: '大理',
        tag: '云南省',
        role: '风花雪月 · 尚未踏足',
        impression: '“大理的夜，真的很冷”'
      },
      '120000_天津': {
        name: '天津',
        tag: '天津市',
        role: '津门故里 · 尚未踏足',
        impression: '我最好的朋友在这里读书'
      }
    };

    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const cityName = params.get('name');
    let data = CITY_PROFILES[id] || DISTRICT_NOTES[id] || WISHLIST_IMPRESSIONS[id];
    const isDistrict = !CITY_PROFILES[id] && DISTRICT_NOTES[id];
    const isWishlist = !CITY_PROFILES[id] && !DISTRICT_NOTES[id] && WISHLIST_IMPRESSIONS[id];
    const isGeneric = !data && cityName;
    const app = document.getElementById('app');

    const formatImpression = (imp) => {
      if (!imp) return '';
      if (Array.isArray(imp)) return imp.map(p => `<p>${p}</p>`).join('');
      return imp;
    };

    // Parse province adcode from id (format: "440000_guangzhou")
    const provinceAdcode = id ? id.split('_')[0] : null;
    if (provinceAdcode) {
      document.getElementById('backLink').href = `map-detail.html?id=${provinceAdcode}`;
    }

    if (!data && !isGeneric) {
      app.innerHTML = `
        <div class="not-found">
          <h2>DATA NOT FOUND</h2>
          <p style="color:var(--titanium-dim);margin-bottom:1.5rem;font-size:0.8rem;">未找到该城市的足迹数据</p>
          <a href="${provinceAdcode ? `map-detail.html?id=${provinceAdcode}` : 'index.html#mymap'}">&larr; ${provinceAdcode ? '返回省份' : '返回地图'}</a>
        </div>`;
      document.title = 'MOB1S | City Not Found';
    } else if (isGeneric) {
      // Generic impression page for any city passed via URL
      const genProvince = params.get('province') || '';
      document.title = 'MOB1S | ' + cityName;
      app.innerHTML = `
        <div class="city-hero">
          <span class="city-tag">${genProvince}</span>
          <h1 class="city-name-cn">${cityName}</h1>
          <p class="city-role">尚未踏足 · 期待未来</p>
        </div>
        <div class="city-content">
          <div class="city-grid" style="grid-template-columns:1fr;">
            <div class="impression-section">
              <h2>// 我的印象</h2>
              <div class="impression-card">在这里写下你对${cityName}的印象或期待...</div>
            </div>
          </div>
        </div>
      `;
    } else if (isWishlist || isDistrict) {
      // Wishlist city — simple impression layout
      document.title = 'MOB1S | ' + data.name;
      app.innerHTML = `
        <div class="city-hero">
          <span class="city-tag">${data.tag}</span>
          <h1 class="city-name-cn">${data.name}</h1>
          <p class="city-role">${data.role}</p>
        </div>
        <div class="city-content">
          <div class="city-grid" style="grid-template-columns:1fr;">
            <div class="impression-section">
              <h2>// 我的印象</h2>
              <div class="impression-card">${formatImpression(data.impression)}</div>
            </div>
          </div>
        </div>
      `;
    } else {
      // Full profile — visited city
      document.title = 'MOB1S | ' + data.name;

      const statsHTML = data.stats.map(s => `
        <div class="stat-block">
          <div class="stat-val">${s.v}</div>
          <div class="stat-lbl">${s.l}</div>
        </div>
      `).join('');

      const bioHTML = data.bio.map(p => `<p>${p}</p>`).join('');

      const highlightHTML = data.highlights.map(h => `
        <div class="highlight-item">
          <span class="highlight-marker">&diams;</span>
          <span>${h}</span>
        </div>
      `).join('');

      app.innerHTML = `
        <div class="city-hero">
          <span class="city-tag">${data.tag}</span>
          <h1 class="city-name-cn">${data.name}</h1>
          <p class="city-role">${data.role}</p>
        </div>
        <div class="city-content">
          ${data.impression ? `
          <div class="impression-section">
            <h2>// 城市印象</h2>
            <div class="impression-card">${formatImpression(data.impression)}</div>
          </div>
          ` : ''}
          <div class="stats-row">${statsHTML}</div>
          <div class="city-grid">
            <div class="bio-section">
              <h2>// 足迹故事</h2>
              ${bioHTML}
            </div>
            <div class="highlights-section">
              <h2>// 旅行亮点</h2>
              <div class="highlight-list">${highlightHTML}</div>
            </div>
          </div>
        </div>
      `;
    }
  </script>
