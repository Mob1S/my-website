  <style>
    /* ============================================
       Detail Page — Carbon Telemetry
       ============================================ */
    :root {
      --carbon: #0a0a0c;
      --carbon-light: #111115;
      --carbon-card: #14141a;
      --neon: #bfff00;
      --neon-dim: rgba(191, 255, 0, 0.12);
      --neon-glow: rgba(191, 255, 0, 0.35);
      --neon-ghost: rgba(191, 255, 0, 0.06);
      --amber: #ff8c00;
      --amber-dim: rgba(255, 140, 0, 0.2);
      --titanium: #a0a0aa;
      --titanium-dim: #5a5a66;
      --white: #e8e8ec;
      --white-dim: #90909a;
      --border-hairline: rgba(255, 255, 255, 0.05);
      --border-subtle: rgba(255, 255, 255, 0.08);
      --border-active: rgba(191, 255, 0, 0.25);
      --font-display: 'Orbitron', system-ui, sans-serif;
      --font-mono: 'Space Mono', 'Consolas', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-mono);
      background: var(--carbon);
      color: var(--white);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    /* Carbon overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.05;
      background:
        repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255,255,255,0.008) 2px, rgba(255,255,255,0.008) 4px),
        radial-gradient(ellipse at 50% 0%, rgba(191,255,0,0.04) 0%, transparent 60%);
    }

    /* Telemetry grid */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.03;
      background:
        linear-gradient(90deg, var(--white) 1px, transparent 1px),
        linear-gradient(0deg, var(--white) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at 50% 30%, black 35%, transparent 70%);
    }

    /* --- Top bar --- */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1.5rem;
      background: rgba(10, 10, 12, 0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-hairline);
      font-family: var(--font-mono);
      font-size: 0.65rem;
    }

    .bar-back {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--white-dim);
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 0.15em;
      transition: color 0.3s;
    }

    .bar-back:hover { color: var(--neon); }

    .bar-back-arrow {
      color: var(--neon);
      font-size: 0.85rem;
      line-height: 1;
    }

    .bar-brand {
      font-family: var(--font-display);
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      color: var(--white);
    }

    .bar-brand span { color: var(--neon); }

    .bar-mode {
      color: var(--neon);
      font-weight: 700;
      letter-spacing: 0.15em;
      font-size: 0.55rem;
      border: 1px solid var(--neon-dim);
      padding: 0.2rem 0.6rem;
    }

    /* --- Hero --- */
    .profile-hero {
      min-height: 50vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      z-index: 1;
      padding: 7rem 2rem 3rem;
    }

    .hero-tag {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      color: var(--neon);
      border: 1px solid var(--neon);
      padding: 0.4rem 1.2rem;
      margin-bottom: 1.5rem;
    }

    .hero-name {
      font-family: var(--font-display);
      font-size: clamp(2.8rem, 8vw, 6rem);
      font-weight: 900;
      text-transform: uppercase;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    .hero-name .hl {
      color: var(--neon);
      text-shadow: 0 0 80px var(--neon-glow);
    }

    .hero-role {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--titanium);
      margin-top: 0.8rem;
    }

    /* --- Content --- */
    .profile-content {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 0 2rem 5rem;
    }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.6rem;
      margin-bottom: 3rem;
    }

    .stat-block {
      background: var(--carbon-card);
      border: 1px solid var(--border-subtle);
      text-align: center;
      padding: 1.5rem 0.8rem;
    }

    .stat-val {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--neon);
      line-height: 1.1;
    }

    .stat-lbl {
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--titanium-dim);
      margin-top: 0.5rem;
      text-transform: uppercase;
    }

    /* Bio + details grid */
    .profile-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
    }

    /* Bio */
    .bio-section h2 {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      color: var(--neon);
      margin-bottom: 1.2rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border-active);
    }

    .bio-section p {
      font-size: 0.82rem;
      color: var(--white-dim);
      line-height: 1.85;
      margin-bottom: 1rem;
    }

    /* Achievements sidebar */
    .achieve-section h2 {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      color: var(--neon);
      margin-bottom: 1.2rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border-active);
    }

    .achieve-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .achieve-item {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      font-size: 0.78rem;
      color: var(--white-dim);
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border-hairline);
    }

    .achieve-marker {
      color: var(--neon);
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 0.15rem;
    }

    /* --- Not found --- */
    .not-found {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      z-index: 1;
      padding: 2rem;
    }

    .not-found h2 {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 900;
      color: var(--neon);
      margin-bottom: 1rem;
    }

    .not-found a {
      color: var(--neon);
      text-decoration: none;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      margin-top: 1rem;
      transition: opacity 0.3s;
    }

    .not-found a:hover { opacity: 0.7; }

    /* --- Responsive --- */
    @media (max-width: 768px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
      .profile-grid { grid-template-columns: 1fr; gap: 2rem; }
      .stat-val { font-size: 1.3rem; }
    }
  </style>
</head>
