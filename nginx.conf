# MOB1S Website — Nginx Reverse Proxy Config
# ──────────────────────────────────────────────────────────────
# 部署步骤:
#   1. sudo cp nginx.conf /etc/nginx/sites-available/mob1s
#   2. sudo rm -f /etc/nginx/sites-enabled/default   ← 删掉默认站点！
#   3. sudo ln -s /etc/nginx/sites-available/mob1s /etc/nginx/sites-enabled/
#   4. sudo nginx -t && sudo systemctl reload nginx
# ──────────────────────────────────────────────────────────────

upstream mob1s_backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    server_name your-domain.com;  # ← 改成你的域名或公网IP

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # --- Gzip ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/event-stream;
    gzip_min_length 1024;

    # --- Root directory for static files ---
    root /var/www/mob1s;  # ← 改成你的项目实际部署路径

    # =============================================
    #  重要: API 路由必须写在 location / 前面！
    #  Nginx 用最长前缀匹配，/api/ 优先于 /
    #  但顺序写对了更不容易出错
    # =============================================

    # --- Health check (精确匹配，最高优先级) ---
    location = /api/health {
        proxy_pass http://mob1s_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # --- AI Chat API (SSE 长连接配置) ---
    location /api/ {
        proxy_pass http://mob1s_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming 专用配置
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # 超时配置（AI 响应可能较慢）
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 120s;
    }

    # --- Static files → fallback to Node.js ---
    location / {
        try_files $uri $uri/ @backend;
    }

    # --- Named fallback: unmatched routes go to Express ---
    location @backend {
        proxy_pass http://mob1s_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Error pages ---
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
